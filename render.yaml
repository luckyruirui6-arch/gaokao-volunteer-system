services:
  - type: web
    name: gaokao-volunteer-system
    env: node
    region: oregon
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_VERSION
        value: "18"
      - key: API_KEY
        sync: false
      - key: LLM_BASE_URL
        value: "https://api.deepseek.com/v1"
      - key: LLM_MODEL
        value: "deepseek-chat"
      - key: EMBEDDINGS_URL
        value: "https://api.deepseek.com/v1/embeddings"
      - key: EMBEDDING_MODEL
        value: "text-embedding-ada-002"
      - key: PORT
        value: "3011"