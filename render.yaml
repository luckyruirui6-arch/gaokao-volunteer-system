services:
  - type: web
    name: gaokao-volunteer-system
    env: node
    plan: starter
    buildCommand: npm install
    startCommand: node server/server.js
    workingDirectory: ./
    healthCheckPath: /
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        fromService:
          type: web
          name: gaokao-volunteer-system
          envVarKey: PORT
      - key: API_KEY
        sync: false
      - key: LLM_BASE_URL
        sync: false
      - key: LLM_MODEL
        sync: false
      - key: EMBEDDINGS_URL
        sync: false
      - key: EMBEDDING_MODEL
        sync: false
      - key: QDRANT_URL
        sync: false
      - key: QDRANT_API_KEY
        sync: false